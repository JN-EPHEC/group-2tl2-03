services:
  dns:
    image: internetsystemsconsortium/bind9:9.18
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./bind/config:/etc/bind
      - ./bind/zones:/var/lib/bind
      - ./bind/logs:/var/log/bind
    networks:
      - dmz

  web:
    build: ./web 
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx.conf:/etc/nginx/nginx.conf:ro
      # ON SUPPRIME la ligne ./web/html:/var/www/html car le code est BÂTI dans l'image
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      - dmz
  db:
    image: mariadb:11.1
    restart: always
    env_file:
      - ./db/root.env
      - ./db.env
    volumes: 
      - ./db/sql:/docker-entrypoint-initdb.d/
      - ./db/my-resolve.cnf:/etc/mysql/conf.d/my-resolve.cnf:ro
      - db_data:/var/lib/mysql
    networks:
      - db_net


  php:
    build: ./server        # Utilise ton nouveau code TS
    restart: always
      # On synchronise le BON dossier avec le WORKDIR du Dockerfile
    env_file:
      - ./db.env
      - ./server/.env
    networks:
      - db_net                  
    command: npm run dev
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: l2-5.ephec-ti.be
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
      - "465:465"
    volumes:
      - ./mail/docker-data/dms/config:/tmp/docker-mailserver
      - ./mail/docker-data/dms/mail-data:/var/mail
      - ./mail/docker-data/dms/mail-state:/var/mail-state
      - ./mail/docker-data/dms/mail-logs:/var/log/mail
      - /etc/localtime:/etc/localtime:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    environment:
      - ENABLE_OPENDKIM=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_SASLAUTHD=0
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_AMAVIS=1
      - SA_SPAM_SUBJECT=***SPAM***
      - SPOOF_PROTECTION=0
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/etc/letsencrypt/live/l2-5.ephec-ti.be/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/live/l2-5.ephec-ti.be/privkey.pem
    networks:
      - dmz
    restart: always
      

networks:
  dmz:
  db_net:
    

volumes:
  db_data: