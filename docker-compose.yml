services:
  # 1. Le DNS : Indispensable pour la résolution de ton nom de domaine ephec-ti.be
  dns:
    image: internetsystemsconsortium/bind9:9.18
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./bind/config:/etc/bind
      - ./bind/zones:/var/lib/bind
      - ./bind/logs:/var/log/bind
    networks:
      - dmz

  # 2. Le Frontend (Nginx) : Sert ton interface de Quiz et gère le HTTPS
  web:
    build: ./web 
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      - dmz

  # 3. Le Backend (Node.js) : Ton "cerveau" que nous venons de coder
  server:
    build: ./server
    restart: always
    # On utilise le fichier .env qui contient ta DATABASE_URL de Supabase
    env_file:
      - ./server/.env
    networks:
      - dmz

networks:
  dmz:
    driver: bridge